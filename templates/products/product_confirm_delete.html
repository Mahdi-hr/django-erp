{% extends "base.html" %}
{% load jalali_filters %}

{% block page_icon %}box{% endblock %}
{% block page_title %}محصول{% endblock %}

{% block content %}
<div class="animate-in">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-exclamation-triangle ms-2"></i> تأیید حذف</h5>
                </div>
                <div class="card-body text-center">
                    <p class="mb-4">آیا از حذف <strong>{{ object }}</strong> اطمینان دارید؟</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash ms-2"></i> بله، حذف شود
                            </button>
                            <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-times ms-2"></i> انصراف
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
