{% extends "base.html" %}

{% block title %}تأیید حذف{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="fas fa-exclamation-triangle ms-2"></i> تأیید حذف
            </div>
            <div class="card-body text-center">
                <p>آیا از حذف <strong>{{ object }}</strong> اطمینان دارید؟</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash ms-2"></i> بله، حذف شود
                        </button>
                        <a href="{% url 'material_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times ms-2"></i> انصراف
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
