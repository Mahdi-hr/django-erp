{% extends "base.html" %}
{% load jalali_filters %}

{% block page_icon %}cubes{% endblock %}
{% block page_title %}حذف دسته‌بندی{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger animate-in">
            <div class="card-header" style="color:var(--accent-danger);">
                <i class="fas fa-exclamation-triangle ms-2"></i> تأیید حذف
            </div>
            <div class="card-body text-center">
                <p class="mb-3">آیا از حذف دسته‌بندی <strong>{{ object.name }}</strong> اطمینان دارید؟</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash ms-2"></i> بله، حذف شود
                        </button>
                        <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-times ms-2"></i> انصراف
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
